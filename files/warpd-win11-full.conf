# warpd Windows 11 完整配置示例
# 说明：
# 1. 井号 # 开头的整行会被忽略，可放心写注释。
# 2. 本文件按“配置项: 值”格式书写。
# 3. 如果一个功能支持多个键，键之间用空格分隔。
# 4. 下面大部分值都保持源码默认值，便于你后面自己改。

# ====================
# 全局激活热键
# ====================

# 激活 Hint 模式
hint_activation_key: A-M-x

# 激活两阶段 Hint 模式
hint2_activation_key: A-M-X

# 激活 Smart Hint 模式
smart_hint_activation_key: A-M-f

# Smart Hint 标签模式：
# numeric = 数字标签 + 模糊过滤
# alphabet = 传统字母标签
smart_hint_mode: numeric

# 激活 Grid 模式
grid_activation_key: A-M-g

# 激活历史 Hint 模式
history_activation_key: A-M-h

# 激活多屏选择模式
screen_activation_key: A-M-s

# 激活普通移动模式
activation_key: A-M-c

# 一次性 Hint：选完就退出
hint_oneshot_key: A-M-l

# 一次性两阶段 Hint：选完就退出
hint2_oneshot_key: A-M-L

# ====================
# 普通模式按键
# ====================

# 退出当前模式
exit: esc

# 文本插入/编辑模式
toggle_insert_mode: i

# 拖拽开关
drag: v

# 复制当前选择
copy: y

# 复制并退出
copy_and_exit: c

# 粘贴
paste: p

# 加速移动
accelerator: a

# 减速移动
decelerator: d

# 鼠标左/中/右键，按顺序对应 1/2/3
# 默认值：buttons: m , .
buttons: enter \ backspace

# 拖拽使用的鼠标按钮，1=左键 2=中键 3=右键
drag_button: 1

# 一次性点击键：点击后退出
oneshot_buttons: n - /

# 输出当前鼠标坐标到标准输出
print: p

# 进入历史 Hint 模式
history: ;

# 进入 Hint 模式
hint: x

# 进入两阶段 Hint 模式
hint2: X

# 进入 Grid 模式
grid: g

# 进入多屏选择模式
screen: s

# 进入 Smart Hint 模式
smart_hint: f

# 普通模式：向左移动
left: leftarrow

# 普通模式：向下移动
down: downarrow

# 普通模式：向上移动
up: uparrow

# 普通模式：向右移动
right: rightarrow

# 跳到屏幕上边缘
top: H

# 跳到屏幕中线
middle: M

# 跳到屏幕下边缘
bottom: L

# 跳到最左侧
start: 0

# 跳到最右侧
end: $

# 垂直向下滚动
scroll_down: e

# 垂直向上滚动
scroll_up: r

# 水平向左滚动
scroll_left: E

# 水平向右滚动
scroll_right: R

# ====================
# 光标与暂停提示
# ====================

# 普通模式光标颜色
cursor_color: #FF4500

# 普通模式自定义 PNG 光标路径，留空表示用内置样式
cursor_image:

# 加载中光标图片路径，留空表示用内置样式
cursor_image_loading:

# GIF 光标动画速度百分比
cursor_animation_speed: 100

# GIF 光标最多加载多少帧
cursor_max_frames: 60

# 暂停/插入模式提示位置
pause_indicator: topleft

# 暂停提示颜色
pause_indicator_color: #FFA500

# 暂停/插入模式下光标颜色
pause_cursor_color: #00FF00

# 光标尺寸
cursor_size: 7

# 连续移动重复间隔，单位毫秒
repeat_interval: 20

# 普通移动速度
speed: 220

# 最大移动速度
max_speed: 1600

# 按住减速键时的移动速度
decelerator_speed: 50

# 基础加速度
acceleration: 700

# 按住加速键时的加速度
accelerator_acceleration: 2900

# 一次性点击后等待双击的超时时间
oneshot_timeout: 300

# 历史 Hint 大小，按屏幕高度百分比
hist_hint_size: 2

# ====================
# Grid 模式
# ====================

# Grid 默认行数
grid_nr: 2

# Grid 默认列数
grid_nc: 2

# 历史位置后退
hist_back: C-o

# 历史位置前进
hist_forward: C-i

# Grid 向上
grid_up: w

# Grid 向左
grid_left: a

# Grid 向下
grid_down: s

# Grid 向右
grid_right: d

# Grid 只切上半部分
grid_cut_up: W

# Grid 只切左半部分
grid_cut_left: A

# Grid 只切下半部分
grid_cut_down: S

# Grid 只切右半部分
grid_cut_right: D

# Grid 四宫格按书写顺序的键位
grid_keys: u i j k

# Grid 线宽
grid_size: 4

# Grid 边框宽度
grid_border_size: 0

# Grid 颜色
grid_color: #1c1c1e

# Grid 边框颜色
grid_border_color: #ffffff

# Smart Hint 数字模式下确认选中
smart_hint_select: enter space

# ====================
# OpenCV 回退检测参数
# ====================

# OpenCV：最小元素面积
opencv_min_area: 100

# OpenCV：最大元素面积
opencv_max_area: 300000

# OpenCV：最小元素宽度
opencv_min_width: 8

# OpenCV：最小元素高度
opencv_min_height: 8

# OpenCV：最大元素宽度
opencv_max_width: 1000

# OpenCV：最大元素高度
opencv_max_height: 300

# OpenCV：最小宽高比
opencv_min_aspect: 0.15

# OpenCV：最大宽高比
opencv_max_aspect: 15.0

# ====================
# UI 元素检测参数
# ====================

# UI 树最大遍历深度
ui_max_depth: 25

# 最多收集多少个 UI 元素
ui_max_elements: 512

# UI 元素最小宽度
ui_min_width: 10

# UI 元素最小高度
ui_min_height: 10

# UI 元素最小面积
ui_min_area: 100

# 被裁剪后仍需保留的最小可见面积
ui_min_visible_area: 100

# UI 检测超时时间，毫秒
ui_detection_timeout: 5000

# UI 元素去重：最小间距阈值
ui_overlap_threshold: 10

# UI 元素去重：面积重叠阈值
ui_overlap_area_threshold: 0.7

# ====================
# Hint 样式
# ====================

# Hint 背景色
hint_bgcolor: #1c1c1e

# Hint 前景色
hint_fgcolor: #a1aba7

# Hint 标签字符集
hint_chars: abcdefghijklmnopqrstuvwxyz

# Hint 字体
hint_font: Arial

# Hint 大小
hint_size: 20

# Hint 圆角
hint_border_radius: 3

# Hint 回退一步
hint_undo: backspace

# Hint 全部撤销
hint_undo_all: C-u

# 两阶段 Hint 的字符集
hint2_chars: hjkl;asdfgqwertyuiopzxcvb

# 两阶段 Hint 大小
hint2_size: 20

# 两阶段 Hint 间距
hint2_gap_size: 1

# 两阶段 Hint 网格尺寸
hint2_grid_size: 3

# 多屏选择用的字符集
screen_chars: jkl;asdfg

# ====================
# 滚动参数
# ====================

# 初始滚动速度
scroll_speed: 800

# 最大滚动速度
scroll_max_speed: 12000

# 滚动加速度
scroll_acceleration: 2400

# 滚动减速度
scroll_deceleration: -6000

# ====================
# 普通模式指示器
# ====================

# 普通模式屏幕角落指示器位置
indicator: none

# 指示器颜色
indicator_color: #00ff00

# 指示器大小
indicator_size: 12

# 是否使用系统鼠标指针
normal_system_cursor: 0

# 普通模式光标闪烁间隔
# 0 表示不闪烁
# 一个值：显示和隐藏都用同一个时间
# 两个值：第一个是显示时间，第二个是隐藏时间
normal_blink_interval: 0
