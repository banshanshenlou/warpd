name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSYS2
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            make
            findutils
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-binutils

      - name: Build warpd
        shell: msys2 {0}
        run: |
          make STATIC=1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: warpd-windows-exe
          path: bin/*.exe
          if-no-files-found: error
